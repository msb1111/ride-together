<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Ride Together — Live Group Map</title>
<style>
  :root{
    --bg:#12161a;
    --surface:#1c2227;
    --surface-2:#252c32;
    --line:#323a40;
    --text:#eef2ef;
    --muted:#8fa19a;
    --accent:#c8ff4d;
    --accent-ink:#1c2227;
    --danger:#ff6b5e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  #join-screen{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px 24px;}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 6px;}
  h1{font-size:26px;margin:0 0 6px;line-height:1.15;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 22px;}
  label{display:block;font-size:13px;color:var(--muted);margin:16px 0 6px;}
  input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-size:16px;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  button{border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;padding:14px;width:100%;}
  .btn-primary{background:var(--accent);color:var(--accent-ink);margin-top:22px;}
  #status-msg{font-size:13px;color:var(--danger);margin-top:10px;min-height:16px;}

  #map-screen{display:none;height:100%;position:relative;}
  #map{height:100%;width:100%;}

  #search-bar{position:absolute;top:14px;left:14px;right:14px;max-width:390px;z-index:5;}
  #search-bar input{padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(28,34,39,.92);backdrop-filter:blur(8px);color:var(--text);font-size:15px;box-shadow:0 6px 18px rgba(0,0,0,.18);}

  #dest-box{display:none;position:absolute;top:70px;left:14px;right:14px;max-width:390px;background:rgba(28,34,39,.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.24);z-index:4;}
  #route-text{font-size:15px;line-height:1.35;margin-bottom:8px;min-height:18px;color:var(--text);font-weight:600;}
  #next-turn-text{font-size:14px;line-height:1.35;color:var(--accent);margin-bottom:14px;min-height:18px;font-weight:700;}
  #dest-actions{display:flex;gap:10px;}
  #dest-actions a, #dest-actions button{flex:1;min-height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:10px 8px;font-size:13px;line-height:1.2;font-weight:800;text-align:center;text-decoration:none;cursor:pointer;}
  #dest-actions a{color:var(--accent);}
  #dest-actions button{color:var(--danger);}

  #panel{position:absolute;top:84px;left:14px;right:14px;max-width:390px;background:rgba(28,34,39,.9);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px 14px;box-shadow:0 8px 24px rgba(0,0,0,.22);z-index:3;}
  #map-screen.destination-active #panel{top:238px;}
  #panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 10px;opacity:.95;font-weight:800;}
  .rider-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:15px;color:var(--text);}
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.08);}
  .rider-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
  .rider-time{color:var(--muted);font-size:12px;white-space:nowrap;}
  .offline{opacity:.35;}

  #share-toggle-btn{position:absolute;bottom:18px;left:14px;right:90px;max-width:300px;background:var(--accent);color:var(--accent-ink);box-shadow:0 8px 24px rgba(0,0,0,.24);z-index:5;}
  #share-toggle-btn.sharing{background:var(--danger);color:#1c1c1c;}
  #center-btn{position:absolute;bottom:18px;right:14px;width:56px;height:56px;border-radius:50%;background:var(--surface);border:1px solid var(--line);color:var(--accent);font-size:20px;padding:0;box-shadow:0 8px 24px rgba(0,0,0,.24);z-index:5;}
  @media(max-width:420px){
    #dest-actions a, #dest-actions button{font-size:12px;}
    #map-screen.destination-active #panel{top:246px;}
  }
  @media(min-width:640px){
    #share-toggle-btn{left:14px;right:auto;}
  }
</style>
</head>
<body>

<div id="join-screen">
  <div class="card">
    <p class="eyebrow">Ride Together</p>
    <h1>See your group, live.</h1>
    <p class="sub">Everyone who opens this page with the same group code shows up on the same map.</p>
    <label for="name-input">Your name</label>
    <input id="name-input" maxlength="30" placeholder="e.g. Manjyot Singh">
    <label for="group-input">Group code</label>
    <input id="group-input" maxlength="24" placeholder="e.g. amritsar-sunday-ride">
    <label for="access-input">Access code</label>
    <input id="access-input" maxlength="30" placeholder="e.g. gt101">
    <button id="join-btn" class="btn-primary">Start sharing my location</button>
    <p id="status-msg"></p>
  </div>
</div>

<div id="map-screen">
  <div id="map"></div>
  <div id="search-bar">
    <input id="search-input" placeholder="Search a place…">
  </div>
  <div id="dest-box">
    <div id="route-text"></div>
    <div id="next-turn-text"></div>
    <div id="dest-actions">
      <a id="nav-link" href="#" target="_blank" rel="noopener">Navigate on Google Maps</a>
      <button id="clear-dest-btn" type="button">Clear Destination</button>
    </div>
  </div>
  <div id="panel">
    <h2>On this ride</h2>
    <div id="rider-list"></div>
  </div>
  <button id="center-btn" title="Center on group">⌖</button>
  <button id="share-toggle-btn">Start Sharing</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, set, remove, onValue, onDisconnect, get
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0OXUeBOISROpw4RSu1u5advqrcnSjaX8",
    authDomain: "gilded-throttle-ride-share.firebaseapp.com",
    databaseURL: "https://gilded-throttle-ride-share-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "gilded-throttle-ride-share",
    storageBucket: "gilded-throttle-ride-share.firebasestorage.app",
    messagingSenderId: "467624812499",
    appId: "1:467624812499:web:cf846a74a90972d8f81926"
  };

  const GOOGLE_MAPS_API_KEY = "AIzaSyDNTGxZo7faT9_09ywX-bohKlbCJEjUvig";

  // ---------------------------------------------------------------
  // SETUP: edit these two to control who can join, and for how long.
  // Change ACCESS_CODE whenever you want to invalidate the old one —
  // just edit + redeploy (git add, commit, push).
  // ---------------------------------------------------------------
  const ACCESS_CODE = "gt101";
  const ACCESS_CODE_EXPIRES = new Date("2026-09-20T23:59:59+05:30").getTime();

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PALETTE = ["#c8ff4d","#4fb6e8","#ff8a5b","#c08bff","#5be8b0","#ffd166","#ff6b9f","#7ddbff","#ffa8a8","#9ee493","#f4978e","#84dcc6","#f9c74f","#90be6d","#577590","#f3722c"];

  let riderId = localStorage.getItem("rt_riderId");
  if(!riderId){ riderId = crypto.randomUUID(); localStorage.setItem("rt_riderId", riderId); }

  let groupCode = "", riderName = "";
  let map = null, markers = {}, latestData = {}, latestColors = {}, lastBounds = null;
  let autoFit = false, lastAutoFitAt = 0, suppressAutoFitToggle = false, isSharing = false;
  let watchId = null, writeTimer = null, lastPos = null, wakeLock = null;
  let groupRootRef = null, myRef = null, myColorRef = null, groupUnsubscribe = null, latestDestination = null;
  let destinationMarker = null;
  let directionsService = null, directionsRenderer = null, lastRouteOrigin = null, lastDestTs = null;
  let latestRouteLeg = null, currentStepIndex = 0;

  function haversineMeters(a, b){
    const R = 6371000, toRad = d => d * Math.PI/180;
    const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
    const x = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(x));
  }

  function stripHtml(html){
    const d = document.createElement("div");
    d.innerHTML = html || "";
    return (d.textContent || d.innerText || "").replace(/\s+/g, " ").trim();
  }

  function requestOneShotLocation(reason){
    if(!navigator.geolocation || isSharing) return;
    navigator.geolocation.getCurrentPosition(
      pos => { lastPos = pos; updateRoute(true); updateNextTurn(); },
      err => {
        const textEl = document.getElementById("route-text");
        if(textEl && latestDestination) textEl.textContent = "Location needed to calculate route. Press Start Sharing or allow location.";
      },
      { enableHighAccuracy:true, maximumAge:10000, timeout:12000 }
    );
  }

  function updateNextTurn(){
    const turnEl = document.getElementById("next-turn-text");
    if(!turnEl) return;
    if(!latestRouteLeg || !latestRouteLeg.steps || !latestRouteLeg.steps.length || !lastPos){
      turnEl.textContent = latestDestination ? "Next turn will appear once your route is ready." : "";
      return;
    }
    const here = { lat: lastPos.coords.latitude, lng: lastPos.coords.longitude };

    while(currentStepIndex < latestRouteLeg.steps.length - 1){
      const stepEnd = latestRouteLeg.steps[currentStepIndex].end_location;
      const stepEndPos = { lat: stepEnd.lat(), lng: stepEnd.lng() };
      if(haversineMeters(here, stepEndPos) < 55) currentStepIndex++;
      else break;
    }

    const step = latestRouteLeg.steps[currentStepIndex];
    const stepStart = step.start_location;
    const stepEnd = step.end_location;
    const distToStepEnd = haversineMeters(here, { lat: stepEnd.lat(), lng: stepEnd.lng() });
    const distToStepStart = haversineMeters(here, { lat: stepStart.lat(), lng: stepStart.lng() });
    const shownDistance = currentStepIndex === 0 ? Math.min(distToStepEnd, step.distance.value) : distToStepEnd;
    const distText = shownDistance >= 1000 ? (shownDistance/1000).toFixed(1) + " km" : Math.round(shownDistance/10)*10 + " m";
    const instruction = stripHtml(step.instructions) || "Continue";

    if(currentStepIndex >= latestRouteLeg.steps.length - 1 && distToStepEnd < 80){
      turnEl.textContent = "You are near the destination.";
    } else {
      turnEl.textContent = `Next: ${instruction} in ${distText}`;
    }
  }

  function updateRoute(force){
    const textEl = document.getElementById("route-text");
    if(!map || !directionsService || !latestDestination || !lastPos){
      if(directionsRenderer) directionsRenderer.setDirections({ routes: [] });
      latestRouteLeg = null;
      currentStepIndex = 0;
      updateNextTurn();
      if(textEl) textEl.textContent = latestDestination ? "Calculating route…" : "";
      if(latestDestination && !lastPos) requestOneShotLocation("route");
      return;
    }
    const origin = { lat: lastPos.coords.latitude, lng: lastPos.coords.longitude };
    if(!force && lastRouteOrigin && haversineMeters(origin, lastRouteOrigin) < 150) return;
    lastRouteOrigin = origin;

    directionsService.route({
      origin,
      destination: { lat: latestDestination.lat, lng: latestDestination.lng },
      travelMode: google.maps.TravelMode.DRIVING
    }, (result, status) => {
      if(status === "OK"){
        directionsRenderer.setDirections(result);
        const leg = result.routes[0].legs[0];
        latestRouteLeg = leg;
        currentStepIndex = 0;
        textEl.textContent = `${leg.distance.text} · ${leg.duration.text} to ${latestDestination.name || "destination"}`;
        updateNextTurn();
      } else {
        latestRouteLeg = null;
        updateNextTurn();
      }
    });
  }

  function hashIndex(id){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; return h % PALETTE.length; }
  function colorFor(id){
    const idx = latestColors[id];
    return PALETTE[(idx !== undefined ? idx : hashIndex(id)) % PALETTE.length];
  }
  function initials(name){
    const parts = (name||"?").trim().split(/\s+/);
    if(parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
    return (parts[0]||"?").slice(0,1).toUpperCase();
  }
  function sanitizeCode(s){ return s.trim().toLowerCase().replace(/[^a-z0-9-]/g,"-").slice(0,24) || "default"; }
  function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

  const nameInput = document.getElementById("name-input");
  const groupInput = document.getElementById("group-input");
  const accessInput = document.getElementById("access-input");
  const statusMsg = document.getElementById("status-msg");
  nameInput.value = localStorage.getItem("rt_name") || "";
  groupInput.value = localStorage.getItem("rt_group") || "";

  document.getElementById("join-btn").addEventListener("click", () => {
    riderName = nameInput.value.trim().slice(0,30);
    groupCode = sanitizeCode(groupInput.value);
    const enteredCode = accessInput.value.trim();

    if(!riderName){ statusMsg.textContent = "Enter your name first."; return; }
    if(Date.now() > ACCESS_CODE_EXPIRES){ statusMsg.textContent = "This access code has expired — ask the organizer for a new one."; return; }
    if(enteredCode !== ACCESS_CODE){ statusMsg.textContent = "Incorrect access code."; return; }
    if(!navigator.geolocation){ statusMsg.textContent = "This browser can't access location."; return; }

    localStorage.setItem("rt_name", riderName);
    localStorage.setItem("rt_group", groupCode);
    document.getElementById("join-screen").style.display = "none";
    document.getElementById("map-screen").style.display = "block";
    startRideSession();
    loadGoogleMaps();
  });

  document.getElementById("share-toggle-btn").addEventListener("click", () => {
    if(isSharing) stopSharing();
    else startSharing();
  });

  document.getElementById("center-btn").addEventListener("click", () => {
    autoFit = true;
    lastAutoFitAt = Date.now();
    fitToGroup();
    updateCenterBtnUI();
  });

  function updateShareButton(){
    const btn = document.getElementById("share-toggle-btn");
    btn.textContent = isSharing ? "Stop Sharing" : "Start Sharing";
    btn.classList.toggle("sharing", isSharing);
  }

  function updateCenterBtnUI(){
    const btn = document.getElementById("center-btn");
    if(!btn) return;
    if(autoFit){
      btn.style.background = "var(--accent)";
      btn.style.color = "var(--accent-ink)";
      btn.title = "Auto-zoom is on";
    } else {
      btn.style.background = "var(--surface)";
      btn.style.color = "var(--accent)";
      btn.title = "Tap to auto-zoom to the group";
    }
  }

  function fitToGroup(){
    if(!map || !lastBounds) return;
    suppressAutoFitToggle = true;
    map.fitBounds(lastBounds, 80);
    google.maps.event.addListenerOnce(map, "idle", () => {
      if(map.getZoom() > 16) map.setZoom(16);
      setTimeout(() => { suppressAutoFitToggle = false; }, 300);
    });
  }

  function maybeAutoFit(){
    if(!autoFit) return;
    const now = Date.now();
    if(now - lastAutoFitAt < 6000) return;
    lastAutoFitAt = now;
    fitToGroup();
  }

  function startRideSession(){
    groupRootRef = ref(db, `groups/${groupCode}`);
    if(groupUnsubscribe) groupUnsubscribe();
    groupUnsubscribe = onValue(groupRootRef, snap => {
      const val = snap.val() || {};
      latestData = val.riders || {};
      latestColors = val.colors || {};
      latestDestination = val.destination || null;
      renderRiders();
      renderDestination();
    });
    isSharing = false;
    autoFit = true;
    lastAutoFitAt = 0;
    updateShareButton();
    updateCenterBtnUI();
  }

  async function startSharing(){
    if(isSharing) return;
    if(!navigator.geolocation){ statusMsg.textContent = "This browser can't access location."; return; }

    myRef = ref(db, `groups/${groupCode}/riders/${riderId}`);
    myColorRef = ref(db, `groups/${groupCode}/colors/${riderId}`);
    onDisconnect(myRef).remove();

    try{
      const existing = await get(ref(db, `groups/${groupCode}/colors`));
      const used = new Set(Object.values(existing.val() || {}));
      let idx = 0;
      while(used.has(idx) && idx < PALETTE.length) idx++;
      if(idx >= PALETTE.length) idx = hashIndex(riderId);
      await set(myColorRef, idx);
    } catch(e){ /* non-fatal — falls back to hash-based colour */ }

    function writeMyLocation(){
      if(!lastPos || !myRef) return;
      set(myRef, {
        name: riderName,
        lat: lastPos.coords.latitude,
        lng: lastPos.coords.longitude,
        heading: lastPos.coords.heading ?? null,
        speed: lastPos.coords.speed ?? null,
        ts: Date.now()
      });
    }

    watchId = navigator.geolocation.watchPosition(
      pos => { lastPos = pos; writeMyLocation(); updateRoute(false); updateNextTurn(); },
      err => { statusMsg.textContent = "Location error: " + err.message; },
      { enableHighAccuracy:true, maximumAge:4000, timeout:15000 }
    );

    writeTimer = setInterval(writeMyLocation, 4000);

    isSharing = true;
    autoFit = true;
    lastAutoFitAt = 0;
    updateShareButton();
    updateCenterBtnUI();
    maybeAutoFit();

    if("wakeLock" in navigator){
      navigator.wakeLock.request("screen").then(l => wakeLock = l).catch(()=>{});
    }
  }

  function stopSharing(){
    if(watchId !== null) navigator.geolocation.clearWatch(watchId);
    watchId = null;
    if(writeTimer) clearInterval(writeTimer);
    writeTimer = null;
    if(myRef) remove(myRef);
    myRef = null;
    if(wakeLock) wakeLock.release().catch(()=>{});
    wakeLock = null;
    lastPos = null;
    isSharing = false;
    autoFit = true;
    lastAutoFitAt = 0;
    updateShareButton();
    updateCenterBtnUI();
  }

  function renderRiders(){
    if(!map) return;
    const bounds = new google.maps.LatLngBounds();
    const list = document.getElementById("rider-list");
    list.innerHTML = "";

    Object.entries(latestData).forEach(([id, r]) => {
      const pos = { lat: r.lat, lng: r.lng };
      bounds.extend(pos);
      const isMe = id === riderId;
      const color = colorFor(id);

      if(!markers[id]){
        markers[id] = new google.maps.Marker({
          map, position: pos,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: isMe?11:9, fillColor:color, fillOpacity:1, strokeColor:"#12161a", strokeWeight: isMe?3:2 },
          label: { text: initials(r.name), color:"#12161a", fontWeight:"700", fontSize:"10px" },
          title: r.name
        });
      } else {
        markers[id].setPosition(pos);
        markers[id].setIcon({ path: google.maps.SymbolPath.CIRCLE, scale: isMe?11:9, fillColor:color, fillOpacity:1, strokeColor:"#12161a", strokeWeight: isMe?3:2 });
      }

      const stale = Date.now() - r.ts > 90000;
      markers[id].setOpacity(stale ? 0.35 : 1);

      const secsAgo = Math.max(0, Math.round((Date.now() - r.ts)/1000));
      const row = document.createElement("div");
      row.className = "rider-row" + (stale ? " offline" : "");
      row.innerHTML = `<span class="dot" style="background:${color}"></span>
        <span class="rider-name">${esc(r.name||"Rider")}${isMe ? " (you)" : ""}</span>
        <span class="rider-time">${stale ? "offline" : secsAgo + "s ago"}</span>`;
      list.appendChild(row);
    });

    Object.keys(markers).forEach(id => {
      if(!latestData[id]){ markers[id].setMap(null); delete markers[id]; }
    });

    if(Object.keys(latestData).length){
      lastBounds = bounds;
      maybeAutoFit();
    }
  }

  setInterval(() => renderRiders(), 5000);

  function renderDestination(){
    if(!map) return;
    const box = document.getElementById("dest-box");
    if(!latestDestination){
      if(destinationMarker){ destinationMarker.setMap(null); destinationMarker = null; }
      box.style.display = "none";
      document.getElementById("map-screen").classList.remove("destination-active");
      lastRouteOrigin = null; lastDestTs = null; latestRouteLeg = null; currentStepIndex = 0;
      updateRoute(false);
      updateNextTurn();
      return;
    }
    const pos = { lat: latestDestination.lat, lng: latestDestination.lng };
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${pos.lat},${pos.lng}&travelmode=driving`;
    const label = latestDestination.name || "Meeting point";

    if(latestDestination.ts !== lastDestTs){
      lastDestTs = latestDestination.ts;
      lastRouteOrigin = null;
      latestRouteLeg = null;
      currentStepIndex = 0;
      updateRoute(true);
      if(!lastPos) requestOneShotLocation("destination");
    }

    if(!destinationMarker){
      destinationMarker = new google.maps.Marker({ map, position: pos, title: label });
    } else {
      destinationMarker.setPosition(pos);
      destinationMarker.setTitle(label);
    }

    box.style.display = "block";
    document.getElementById("map-screen").classList.add("destination-active");
    document.getElementById("nav-link").href = navUrl;
    document.getElementById("clear-dest-btn").onclick = () => {
      if(confirm(`Clear destination "${label}" for everyone on the ride? This can't be undone.`)){
        remove(ref(db, `groups/${groupCode}/destination`));
      }
    };
  }

  function setupSearch(){
    const input = document.getElementById("search-input");
    const autocomplete = new google.maps.places.Autocomplete(input, { fields:["geometry","name"] });
    autocomplete.bindTo("bounds", map);
    autocomplete.addListener("place_changed", () => {
      const place = autocomplete.getPlace();
      if(!place.geometry) return;
      const loc = place.geometry.location;
      autoFit = false;
      updateCenterBtnUI();
      map.panTo(loc);
      map.setZoom(15);
      set(ref(db, `groups/${groupCode}/destination`), {
        lat: loc.lat(), lng: loc.lng(), name: place.name || input.value, ts: Date.now()
      });
    });
  }

  const NIGHT_STYLE = [
    { elementType:"geometry", stylers:[{color:"#1c2227"}] },
    { elementType:"labels.text.fill", stylers:[{color:"#8fa19a"}] },
    { elementType:"labels.text.stroke", stylers:[{color:"#12161a"}] },
    { featureType:"road", elementType:"geometry", stylers:[{color:"#2a3137"}] },
    { featureType:"water", elementType:"geometry", stylers:[{color:"#16373f"}] },
    { featureType:"poi", stylers:[{visibility:"off"}] }
  ];
  const DAY_STYLE = [
    { elementType:"geometry", stylers:[{color:"#f3f1ec"}] },
    { elementType:"labels.text.fill", stylers:[{color:"#5b6470"}] },
    { elementType:"labels.text.stroke", stylers:[{color:"#ffffff"}] },
    { featureType:"road", elementType:"geometry", stylers:[{color:"#ffffff"}] },
    { featureType:"road", elementType:"geometry.stroke", stylers:[{color:"#e0ddd5"}] },
    { featureType:"water", elementType:"geometry", stylers:[{color:"#bfe0e8"}] },
    { featureType:"poi", stylers:[{visibility:"off"}] }
  ];
  function isDaytime(){ const h = new Date().getHours(); return h >= 6 && h < 19; }
  function getMapStyle(){ return isDaytime() ? DAY_STYLE : NIGHT_STYLE; }

  function initMap(){
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 31.634, lng: 74.872 },
      zoom: 12,
      disableDefaultUI: true,
      zoomControl: true,
      styles: getMapStyle()
    });
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      map, suppressMarkers: true,
      polylineOptions: { strokeColor: "#c8ff4d", strokeWeight: 5, strokeOpacity: 0.85 }
    });
    map.addListener("dragstart", () => {
      autoFit = false;
      updateCenterBtnUI();
    });
    map.addListener("zoom_changed", () => {
      if(!suppressAutoFitToggle){
        autoFit = false;
        updateCenterBtnUI();
      }
    });
    updateCenterBtnUI();
    renderRiders();
    renderDestination();
    setupSearch();
    setInterval(() => { if(map) map.setOptions({ styles: getMapStyle() }); }, 5*60*1000);
    setInterval(() => updateRoute(false), 30*1000);
    setInterval(() => updateNextTurn(), 5000);
  }

  let mapsLoading = false;
  function loadGoogleMaps(){
    if(mapsLoading || window.google) { if(window.google) initMap(); return; }
    mapsLoading = true;
    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places`;
    script.async = true;
    script.onload = initMap;
    script.onerror = () => { statusMsg.textContent = "Google Maps failed to load — check your API key."; };
    document.head.appendChild(script);
  }
</script>
</body>
</html>
